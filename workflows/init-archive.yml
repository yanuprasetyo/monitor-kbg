name: Inisialisasi Arsip Historis

on:
  workflow_dispatch:   # hanya jalan kalau dipicu manual

permissions:
  contents: write

jobs:
  scrape-sitemap:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # maks 3 jam (sitemap bisa sangat besar)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Jalankan scraper sitemap
        run: python scripts/scrape_sitemap.py

      - name: Commit arsip ke repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/news.json docs/data/scrape_progress.json
          git diff --staged --quiet || git commit -m "chore: inisialisasi arsip historis $(date -u +'%Y-%m-%d')"
          git push
