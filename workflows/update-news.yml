name: Update Berita Monitor

on:
  schedule:
    # Jalankan tiap 6 jam: 00:00, 06:00, 12:00, 18:00 UTC (07:00, 13:00, 19:00, 01:00 WIB)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:  # bisa dijalankan manual dari GitHub

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch berita terbaru
        run: python scripts/fetch_news.py

      - name: Commit dan push data terbaru
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/news.json
          git diff --staged --quiet || git commit -m "chore: update berita $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
