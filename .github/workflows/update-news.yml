name: Update Berita Monitor

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch berita terbaru
        run: python scripts/fetch_news.py
      - name: Commit dan push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/news.json
          git diff --staged --quiet || git commit -m "chore: update berita $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
